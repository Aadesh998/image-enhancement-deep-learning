data:
    value:
        base_dir: data/lol_dataset/images/low
        batch_size: 16
        color_space: YCbCr
        image_size: 256
        num_workers: 4
        test_split: 0.1
        train_path: data/lol_dataset/images/low/*.png
        train_split: 0.7
        validation_split: 0.2
experiment:
    value:
        DESCRIPTION: Low-light enhancement of moon imagery using Zero-DCE
        NAME: moon_enhancement_v1
metrics:
    value:
        calculate_psnr: true
        calculate_ssim: true
model:
    value:
        color_space: YCbCr
        loss_weights:
            color_constancy: 1
            exposure: 10
            exposure_mean_val: 0.57
            illumination_smoothness: 25
            spatial_constancy: 1
        name: Zero-DCE
        network:
            in_channels: 3
            kernel_size: 3
            num_filters: 32
            padding: 1
            stride: 1
        type: enhancement
training:
    value:
        device: cuda
        epochs: 50
        learning_rate: 0.0001
        save_dir: saved_models
        seed: 42
wandb:
    value:
        entity: null
        log_freq: 10
        mode: online
